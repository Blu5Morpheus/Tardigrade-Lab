[theme]
base = "dark"
primaryColor = "#9D4EDD"
backgroundColor = "#0A0014"
secondaryBackgroundColor = "#160028"
textColor = "#F2E6FF"
font = "monospace"

[server]
headless = true
enableCORS = false
enableXsrfProtection = true

[browser]
gatherUsageStats = false

[runner]
fastReruns = true

[client]
toolbarMode = "minimal"
showErrorDetails = false
